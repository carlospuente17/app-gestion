<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="description" content="Una aplicación PWA para gestionar tus tareas personales de forma offline">
  <meta name="theme-color" content="#007AFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mis Tareas">
  <meta name="apple-touch-icon" href="./assets/icons/icon-192.png">
  <meta property="og:title" content="Gestor de Tareas Personal">
  <meta property="og:description" content="Gestiona tus tareas personales de forma offline">
  <meta property="og:image" content="./assets/icons/icon-512.png">

  <title>Gestor de Tareas - Carlos Puente Ortuño</title>
  
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="./assets/icons/icon-192.png">
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png">
  <link rel="stylesheet" href="./assets/styles/styles.css">
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="header-content">
      <!-- Foto de perfil -->
      <img src="./assets/images/profile.png" alt="Perfil de usuario" class="profile-photo">
      
      <!-- Mensaje de bienvenida -->
      <div class="welcome-section">
        <h1>¡Bienvenido!</h1>
        <p>Carlos Puente Ortuño</p>
        <p id="currentDate" style="font-size: 12px; margin-top: 4px;"></p>
      </div>

      <!-- Contador de tareas -->
      <div class="task-stats">
        <span id="taskCounter">0/0</span>
      </div>
    </div>
  </header>

  <!-- CONTENIDO PRINCIPAL -->
  <main>
    <!-- FILTROS -->
    <div class="filters" style="flex-wrap: wrap;">
      <button class="filter-btn active" data-filter="all">
        Todas
      </button>
      <button class="filter-btn" data-filter="pending">
        Pendientes
      </button>
      <button class="filter-btn" data-filter="completed">
        Completadas
      </button>
      <!-- Limpiar Completadas -->
      <button id="clearCompletedBtn" class="filter-btn" style="flex: 100%; margin-top: 8px; color: var(--danger); display: flex; align-items: center; justify-content: center; gap: 6px;">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        Limpiar completadas
      </button>
    </div>

    <!-- LISTA DE TAREAS -->
    <div id="tasksList">
      <!-- Se renderiza dinámicamente con JavaScript -->
    </div>
  </main>

  <!-- BOTÓN FLOTANTE PARA AGREGAR TAREAS -->
  <button id="addTaskBtn" title="Agregar tarea">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
  </button>

  <!-- MODAL PARA ENTRADA DE TAREAS -->
  <div id="inputModal">
    <div class="modal-content">
      <h2>Nueva tarea</h2>
      <div class="modal-input-group">
        <textarea
          id="taskInput"
          placeholder="¿Qué necesitas hacer?"
          maxlength="500"
          autocomplete="off"
        ></textarea>
      </div>
      <div class="modal-input-group" style="display: flex; gap: 8px;">
        <div style="flex: 1;">
          <label for="taskDate">Fecha</label>
          <input
            type="date"
            id="taskDate"
            autocomplete="off"
          >
        </div>
        <div style="flex: 1;">
          <label for="taskTime">Hora</label>
          <input
            type="time"
            id="taskTime"
            autocomplete="off"
          >
        </div>
      </div>
      <div class="modal-input-group" style="margin-top: 10px;">
        <label for="taskPriority">Prioridad</label>
        <select id="taskPriority" style="width: 100%; padding: 10px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.8); font-size: 16px;">
          <option value="low">🟡 Baja</option>
          <option value="medium" selected>🟠 Media</option>
          <option value="high">🔴 Alta</option>
        </select>
      </div>
      <div class="modal-buttons" style="margin-top: 15px;">
        <button id="saveTaskBtn">Crear</button>
        <button id="closeModal">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="./js/storage.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
